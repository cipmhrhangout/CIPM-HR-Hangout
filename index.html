<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRH Hangout | Official Links</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary-blue: #0D3B66; 
    --primary-red: #E63946;  
    --bg-dark: #0A192F;      
    --text-light: #F8F9FA;
    --text-muted: #A0AEC0;
  }

  body {
    background-color: var(--bg-dark);
    color: var(--text-light);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1rem;
    background: 
      radial-gradient(circle at 10% 10%, rgba(13, 59, 102, 0.6) 0%, transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(230, 57, 70, 0.15) 0%, transparent 40%),
      var(--bg-dark);
  }

  .container {
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  /* LOGO FIX: Ensures perfect circle and displays the image */
  .logo-wrapper {
    width: 140px;
    height: 140px;
    margin: 0 auto 1.5rem;
    background: #FFFFFF; 
    border-radius: 50%;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    overflow: hidden;
  }

  .logo-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* Prevents the logo from stretching */
    display: block;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    color: #FFFFFF;
    margin-bottom: 0.5rem;
  }

  h1 span {
    color: var(--primary-red);
  }

  .bio {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-muted);
    margin-bottom: 2.5rem;
    padding: 0 15px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    padding: 1rem 1.4rem;
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(8px);
    border-radius: 14px;
    text-decoration: none;
    color: #FFFFFF;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
  }

  .link-card:hover {
    background: rgba(255, 255, 255, 0.12);
    transform: translateY(-3px);
    border-color: var(--primary-red);
  }

  .icon-wrap {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .instagram .icon-wrap { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .facebook .icon-wrap { background: #1877F2; }
  .icon-wrap svg { width: 22px; height: 22px; fill: white; }

  .link-info { text-align: left; flex: 1; }
  .link-name { font-weight: 600; font-size: 16px; }

  .footer {
    margin-top: 3rem;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo-wrapper">
    <img src="Cipm logo.jpg.jpeg" alt="HR Hangout Logo">
  </div>

  <h1>HR <span>Hangout</span></h1>
  
  <p class="bio">
    HR Hangout is a platform for HR insights, networking, career growth, and professional development for aspiring and experienced professionals.
  </p>

  <div class="links">
    <a href="https://www.instagram.com/hrhangout_cipm" class="link-card instagram" target="_blank">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
      </div>
      <div class="link-info">
        <div class="link-name">Instagram</div>
      </div>
    </a>

    <a href="https://www.facebook.com/share/1D6a78hAXN/" class="link-card facebook" target="_blank">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      </div>
      <div class="link-info">
        <div class="link-name">Facebook</div>
      </div>
    </a>
  </div>

  <div class="footer">
    CIPM Sri Lanka | Learn • Connect • Play
  </div>
</div>

</body>
</html>
